services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: salary_app
      POSTGRES_PASSWORD: salary_app_password
      POSTGRES_DB: salary_dev
    ports:
      # Host 5433 → container 5432: the host already runs a Postgres on 5432.
      # Inside the compose network, services still reach this DB at postgres:5432.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salary_app -d salary_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
